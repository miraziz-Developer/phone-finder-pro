services:
  postgres:
    image: postgres:16-alpine
    container_name: phonebot_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phonebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phonebot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-phonebot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - phonebot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phonebot} -d ${POSTGRES_DB:-phonebot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: phonebot_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - phonebot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phonebot_migrate
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command: >
      sh -c "alembic upgrade head && python scripts/seed.py"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - phonebot_network
    restart: "no"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phonebot_app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - phonebot_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phonebot_api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command: python -m app.api_main
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - phonebot_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  phonebot_network:
    driver: bridge
